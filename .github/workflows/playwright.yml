name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    # Использование v5 полностью решает проблему совместимости с Node
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: '24' # Явно указываем Node.js 24, чтобы не было никаких предупреждений

    # Force rewrite all registry URLs
    - name: Force rewrite all registry URLs
      run: |
        npm config set registry https://registry.npmjs.org/
        rm -f package-lock.json
        npm config set @nerdwallet:registry https://registry.npmjs.org/
        rm -f .npmrc

    - name: Install dependencies
      run: npm install --no-audit --no-fund
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
