name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    # 👇 ЖЕСТКО ЗАПРЕЩАЕМ ЛЮБЫЕ КОРПОРАТИВНЫЕ ССЫЛКИ И ПЕРЕНАПРАВЛЯЕМ ИХ НА PUBLIC
    - name: Force rewrite all registry URLs
      run: |
        npm config set registry https://registry.npmjs.org/
        rm -f package-lock.json
        # Заменяем все упоминания корпоративного сервера в конфигурации npm на публичный
        npm config set @nerdwallet:registry https://registry.npmjs.org/
        # Если в проекте есть файл .npmrc, мы его тоже стираем, чтобы он не мешал
        rm -f .npmrc

    - name: Install dependencies
      run: npm install --no-audit --no-fund
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
